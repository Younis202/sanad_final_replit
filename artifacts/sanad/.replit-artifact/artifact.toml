kind = "web"
previewPath = "/"
title = "Sanad — National Health Infrastructure"
version = "1.0.0"
id = "artifacts/sanad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26138

[services.development]
run = "pnpm --filter @workspace/sanad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sanad", "run", "build" ]
publicDir = "artifacts/sanad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26138"
BASE_PATH = "/"
